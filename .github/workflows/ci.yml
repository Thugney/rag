name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python sources
        run: |
          python -m compileall \
            backend \
            chat_history_db.py \
            chunker.py \
            config_loader.py \
            embedder.py \
            embedding_factory.py \
            generator.py \
            retriever.py \
            tools.py \
            translations.py \
            vector_store.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
