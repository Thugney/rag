services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rag-backend-dev
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      PYTHONPATH: /app
      RAG_CHAT_DB_PATH: /app/data/chat_history.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    ports:
      - "8001:8000"
    restart: unless-stopped
    volumes:
      - ../.env:/app/.env:ro
      - rag_dev_chat_data:/app/data
      - rag_dev_uploaded_docs:/app/uploaded_docs
      - rag_dev_vector_db:/app/vector_db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend-dev
    depends_on:
      backend:
        condition: service_healthy
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8001/api
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3001:3000"
    restart: unless-stopped

volumes:
  rag_dev_chat_data:
  rag_dev_uploaded_docs:
  rag_dev_vector_db:
